# Configuration Netlify — Casal Sport Kaweni
[build]
  publish = "."
  functions = "netlify/functions"

# API propre : /api/* → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache long pour les assets statiques (versionnés par déploiement)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# Le catalogue statique peut changer : cache court
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
