<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Logo CASAL SPORT">
  <title>CASAL SPORT</title>
  <!-- Cadre noir arrondi -->
  <rect width="64" height="64" rx="8" fill="#0A0A0A"/>
  <!-- Initiales CO en sans-serif lourd condensé -->
  <text x="32" y="46" text-anchor="middle"
        font-family="Impact, 'Arial Narrow Bold', 'Anton', 'Bebas Neue', sans-serif"
        font-weight="900" font-size="38"
        fill="#FFFFFF" letter-spacing="-2.5">CS</text>
  <!-- Vague corail (lagon de Mayotte) -->
  <path d="M 14 56 Q 22 51, 30 56 T 46 56 T 54 53"
        stroke="#FF4D3D" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Soleil corail en haut à droite -->
  <circle cx="52" cy="13" r="3.5" fill="#FF4D3D"/>
</svg>
